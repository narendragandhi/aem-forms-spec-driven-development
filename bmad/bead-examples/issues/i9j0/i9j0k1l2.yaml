# Detailed Task Context
context:
  objective: |
    Create a Sling Model that exposes the Hero component's JCR properties
    to the HTL template. Model must implement ComponentExporter for
    headless/SPA compatibility.

  input_specification:
    source: "bmad/03-Architecture-Design/component-design.md"
    section: "Hero Component - Sling Model"
    content: |
      - Sling Model: com.example.aem.bmad.core.models.HeroModel
      - Injects JCR properties from dialog
      - Exposes: heading, subheading, backgroundImage, ctaButtonText, ctaButtonLink
      - All text fields i18n-ready
      - Implements ComponentExporter for JSON export

  constraints:
    - Use @ValueMapValue annotation for injection
    - All fields must be @Optional (graceful degradation)
    - Follow Google Java Style Guide
    - Class-level Javadoc required
    - Resource type must match component path

  design_decisions_made:
    - annotation: "@ValueMapValue"
      alternative: "@Inject"
      reason: "More explicit, type-safe, preferred for JCR properties"

    - annotation: "@Optional"
      reason: "Component should render with partial content"

    - interface: "ComponentExporter"
      reason: "Required for Sling Model Exporter, enables headless consumption"

# Implementation Steps
implementation_steps:
  - step: 1
    description: "Create package structure"
    status: completed
    output: "com.example.aem.bmad.core.models"

  - step: 2
    description: "Create HeroModel class with @Model annotation"
    status: completed
    code: |
      @Model(adaptables = SlingHttpServletRequest.class,
             adapters = {HeroModel.class, ComponentExporter.class},
             resourceType = HeroModel.RESOURCE_TYPE)

  - step: 3
    description: "Add @Exporter annotation for JSON support"
    status: completed
    code: |
      @Exporter(name = ExporterConstants.SLING_MODEL_EXPORTER_NAME,
                extensions = ExporterConstants.SLING_MODEL_EXTENSION)

  - step: 4
    description: "Define RESOURCE_TYPE constant"
    status: completed
    code: |
      static final String RESOURCE_TYPE = "aem-bmad-showcase/components/content/hero";

  - step: 5
    description: "Add field injections with @ValueMapValue @Optional"
    status: completed
    fields:
      - "heading: String"
      - "subheading: String"
      - "backgroundImage: String"
      - "ctaButtonText: String"
      - "ctaButtonLink: String"

  - step: 6
    description: "Add getter methods for all fields"
    status: completed

  - step: 7
    description: "Implement getExportedType() method"
    status: completed
    code: |
      @Override
      public String getExportedType() {
          return RESOURCE_TYPE;
      }

